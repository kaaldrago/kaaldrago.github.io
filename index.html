        
            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaalDrago | Cyberpunk Terminal</title>
    <style>
        :root {
            --bg-color: #05010d; /* Deep Cyberpunk Purple/Black */
            --main-text: #00ffff; /* Neon Cyan */
            --neon-purple: #bd00ff; /* Hot Purple */
            --neon-pink: #ff0055; /* Neon Pink/Red */
            --neon-yellow: #ffff00; /* Cyber Yellow */
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--main-text);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Cyber Neon Glow Effect */
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 2px rgba(0, 255, 255, 1);
        }

        /* Scanline CRT Overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 99;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.65;
        }

        /* Colorful Cyber Box */
        .box {
            text-align: center;
            border: 2px solid var(--neon-purple);
            padding: 35px 25px;
            background: rgba(10, 2, 20, 0.9);
            box-shadow: 0 0 25px var(--neon-purple), inset 0 0 15px rgba(189, 0, 255, 0.3);
            border-radius: 8px;
            z-index: 10;
            width: 90%;
            max-width: 430px;
            position: relative;
        }

        /* Scanning Laser Line */
        .box::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
            animation: scan 3.5s linear infinite;
        }

        #login-screen h2 {
            color: var(--neon-pink);
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-shadow: 0 0 12px var(--neon-pink);
            margin-bottom: 15px;
        }

        .terminal-text {
            color: var(--main-text);
            font-size: 0.85rem;
            margin-bottom: 15px;
            text-align: left;
            display: inline-block;
            width: 85%;
        }

        /* Cyber Input Fields */
        .terminal-input, .terminal-select {
            background: #000;
            border: 1px solid var(--main-text);
            color: var(--main-text);
            padding: 10px;
            font-family: var(--font-family);
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            width: 85%;
            margin-bottom: 15px;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
            border-radius: 4px;
        }

        .terminal-select {
            text-align-last: center;
            cursor: pointer;
            border-color: var(--neon-purple);
            color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(189, 0, 255, 0.3);
        }
        .terminal-select option {
            background: #0d041a;
            color: var(--neon-purple);
        }

        /* Neon Button */
        .btn {
            background: transparent;
            color: var(--neon-pink);
            border: 1px solid var(--neon-pink);
            padding: 10px 25px;
            font-family: var(--font-family);
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-top: 5px;
            text-shadow: 0 0 5px var(--neon-pink);
            box-shadow: 0 0 8px rgba(255, 0, 85, 0.2);
            border-radius: 4px;
        }

        .btn:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 20px var(--neon-pink);
            text-shadow: none;
        }

        #error-msg {
            color: #ff0000;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 0 0 8px #ff0000;
            font-size: 0.9rem;
        }

        #main-dashboard {
            display: none;
            border-color: var(--main-text);
            box-shadow: 0 0 25px var(--main-text);
        }

        h1 {
            font-size: 1.8rem;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            margin-top: 0;
            letter-spacing: 2px;
        }

        /* AI SECTION WITH COLORFUL TERMINAL */
        .ai-container {
            margin-top: 20px;
            border-top: 1px dashed var(--neon-purple);
            padding-top: 15px;
            text-align: left;
        }

        .ai-title {
            color: var(--neon-yellow);
            text-shadow: 0 0 8px var(--neon-yellow);
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        #ai-terminal {
            height: 160px;
            background: #000;
            border: 1px solid var(--neon-purple);
            box-shadow: inset 0 0 10px rgba(189, 0, 255, 0.2);
            padding: 12px;
            overflow-y: auto;
            font-size: 0.85rem;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .ai-input-group {
            display: flex;
            gap: 5px;
        }

        #ai-input {
            flex: 1;
            background: #000;
            border: 1px solid var(--main-text);
            color: var(--main-text);
            padding: 8px;
            font-family: var(--font-family);
            outline: none;
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.2);
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="login-screen" class="box">
        <h2>[ CYBER CORE ACCESS ]</h2>
        <div class="terminal-text">
            kaaldrago_os v2.0.0<br>
            <span style="color:var(--neon-yellow)">[STATUS]: Awaiting credentials...</span>
        </div>
        
        <select id="account-type" class="terminal-select">
            <option value="ADMIN">CORE_LEVEL: ADMIN</option>
            <option value="HACKER">CORE_LEVEL: NET_HACKER</option>
            <option value="GUEST">CORE_LEVEL: GUEST</option>
        </select>

        <input type="text" id="username-field" class="terminal-input" placeholder="USERNAME" autocomplete="off">
        <input type="password" id="password-field" class="terminal-input" placeholder="DECRYPTION KEY" autocomplete="off">
        <br>
        
        <button class="btn" onclick="checkLogin()">INITIALIZE</button>
        <div id="error-msg"></div>
    </div>

    <div id="main-dashboard" class="box">
        <h1>&gt; ACCESS GRANTED</h1>
        <p style="font-size:0.9rem; color: var(--main-text)">SYSTEM OVERRIDE: <span id="display-level" style="color:var(--neon-yellow)">ADMIN</span></p>

        <div class="ai-container">
            <div class="ai-title">🤖 DRAGO_AI NEURAL INTERFACE</div>
            <div id="ai-terminal"></div>
            <div class="ai-input-group">
                <input type="text" id="ai-input" placeholder="Transmit command..." onkeypress="handleKeyPress(event)">
                <button class="btn" style="padding: 8px 12px; font-size:0.8rem; color:var(--main-text); border-color:var(--main-text); text-shadow:0 0 5px var(--main-text);" onclick="askAI()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_USERNAME = "drago";
        const CORRECT_PASSWORD = "drago777"; 

        function checkLogin() {
            const accType = document.getElementById("account-type").value;
            const userInbound = document.getElementById("username-field").value.trim();
            const passInbound = document.getElementById("password-field").value;
            const error = document.getElementById("error-msg");
            
            if (userInbound === CORRECT_USERNAME && passInbound === CORRECT_PASSWORD) {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-dashboard").style.display = "block";
                document.getElementById("display-level").innerText = accType;
                triggerAIWelcome(accType); 
            } else {
                error.innerText = "!! CRITICAL_ERROR: INTRUDER ALERT !!";
                document.getElementById("password-field").value = "";
                setTimeout(() => { error.innerText = ""; }, 2000);
            }
        }

        // COLORFUL WELCOME LOGIC IN AI
        function triggerAIWelcome(role) {
            const terminal = document.getElementById("ai-terminal");
            
            // Neon formatted HTML lines
            const lines = [
                `<span style="color: var(--neon-pink)">&gt; Booting cyberpunk mainframe protocols... [OK]</span>`,
                `<span style="color: var(--main-text)">&gt; Establishing secure uplink for clearance: ${role}</span>`,
                `<span style="color: var(--neon-yellow)">&gt; DRAGO_AI: "Welcome back, Commander KaalDrago. Systems are fully responsive. Neon grids active." 🌌</span>`
            ];

            let delay = 0;
            lines.forEach((line) => {
                setTimeout(() => {
                    terminal.innerHTML += `<br>${line}`;
                    terminal.scrollTop = terminal.scrollHeight;
                }, delay);
                delay += 800;
            });
        }

        function askAI() {
            const inputField = document.getElementById("ai-input");
            const query = inputField.value.trim().toLowerCase();
            const terminal = document.getElementById("ai-terminal");

            if (query === "") return;

            terminal.innerHTML += `<br><br><span style="color: var(--main-text);">&gt; USER:</span> ${inputField.value}`;
            inputField.value = "";

            let reply = `<span style="color: var(--neon-pink)">DRAGO_AI: Error. Unknown protocol sequence.</span>`;
            if (query.includes("hello") || query.includes("hi")) {
                reply = `<span style="color: var(--neon-yellow)">DRAGO_AI: Greetings Commander. Matrix grids are glowing and stable.</span>`;
            } else if (query.includes("clear")) {
                terminal.innerHTML = `<span style="color: var(--main-text)">&gt; Terminal buffer cleared.</span>`;
                return;
            }

            setTimeout(() => {
                terminal.innerHTML += `<br>${reply}`;
                terminal.scrollTop = terminal.scrollHeight;
            }, 400);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') askAI();
        }

        // PURPLE & CYAN MULTI-COLOR MATRIX RAIN
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "010101X█▓▒░";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);

        const draw = () => {
            ctx.fillStyle = 'rgba(5, 1, 13, 0.15)'; // Deep purple fade
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = fontSize + 'px monospace';
            
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                
                // Randomly mixing Cyan and Purple colors in matrix rain
                if (Math.random() > 0.5) {
                    ctx.fillStyle = '#00ffff'; // Neon Cyan
                } else {
                    ctx.fillStyle = '#bd00ff'; // Neon Purple
                }
                
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.98) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };
        setInterval(draw, 40);
    </script>
</body>
</html>
