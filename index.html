<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaalDrago | Network Access</title>
    <style>
        :root {
            --bg-color: #000;
            --main-text: #0F0; /* Matrix Green */
            --accent-1: #0FF; /* Cyan */
            --accent-2: #F0F; /* Magenta */
            --highlight: #FF0; /* Yellow */
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--main-text);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px var(--main-text);
        }

        .container {
            text-align: center;
            border: 2px solid var(--accent-1);
            padding: 40px;
            background: rgba(0, 15, 0, 0.9);
            box-shadow: 0 0 30px var(--accent-2);
            border-radius: 10px;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 25px;
            letter-spacing: 3px;
            color: var(--highlight);
            text-shadow: 0 0 10px var(--highlight);
            animation: glitch 1s infinite alternate;
        }

        .data-line {
            font-size: 1.3rem;
            margin: 12px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .label {
            color: var(--accent-1);
        }

        .value {
            color: var(--accent-2);
            font-weight: bold;
        }

        .status-box {
            margin-top: 25px;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            font-size: 1.4rem;
            color: var(--bg-color);
            background-color: var(--highlight);
            box-shadow: 0 0 15px var(--highlight);
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        /* Matrix Rain Background Effect */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Animations */
        @keyframes glitch {
            0% { transform: skewX(0deg); text-shadow: -2px 0 var(--accent-1), 2px 0 var(--accent-2); }
            20% { transform: skewX(-5deg); text-shadow: -2px 0 var(--accent-1), 2px 0 var(--accent-2); }
            40% { transform: skewX(5deg); text-shadow: 2px 0 var(--accent-1), -2px 0 var(--accent-2); }
            60% { transform: skewX(0deg); text-shadow: 2px 0 var(--accent-1), -2px 0 var(--accent-2); }
            80% { transform: skewX(0deg); text-shadow: -2px 0 var(--accent-1), 2px 0 var(--accent-2); }
            100% { transform: skewX(0deg); text-shadow: -2px 0 var(--accent-1), 2px 0 var(--accent-2); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 15px var(--highlight); }
            50% { opacity: 0.8; box-shadow: 0 0 25px var(--highlight); }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="container">
        <h1>[ KAALDRAGO NETWORK ]</h1>
        <div class="data-line"><span class="label">User:</span><span class="value">Authorized_Drago</span></div>
        <div class="data-line"><span class="label">Protocol:</span><span class="value">Multi-Vector Sec</span></div>
        <div class="data-line"><span class="label">Trace Level:</span><span class="value">Zero / Ghost</span></div>
        <div class="data-line"><span class="label">Quantum Link:</span><span class="value">Established [ 4096-bit ]</span></div>
        <div class="status-box">SYSTEM ACCESS: GHOSTED</div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];

        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            // Darker background fade for clearer rainbow colors
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Change color dynamically for rainbow effect
            const time = Date.now() / 1000;
            const r = Math.floor(Math.sin(time) * 127 + 128);
            const g = Math.floor(Math.sin(time + 2) * 127 + 128);
            const b = Math.floor(Math.sin(time + 4) * 127 + 128);
            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        setInterval(draw, 35);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
